name: Send Issue to Dify AI

on:
  issues:
    types: [opened]

jobs:
  notify_dify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Trigger Dify Workflow
        env:
          DIFY_API_KEY: ${{ secrets.DIFY_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO_NAME: ${{ github.repository }}
        run: |
          # Grab a lightweight list of the files in the repo (ignoring git and node_modules)
          REPO_STRUCTURE=$(find . -type f -not -path "*/\.*" -not -path "*/node_modules/*" | head -n 100)

          # Package it all into JSON
          JSON_PAYLOAD=$(jq -n \
            --arg title "$ISSUE_TITLE" \
            --arg body "$ISSUE_BODY" \
            --arg number "$ISSUE_NUMBER" \
            --arg repo "$REPO_NAME" \
            --arg structure "$REPO_STRUCTURE" \
            '{
              "inputs": {
                "issue_title": $title,
                "issue_body": $body,
                "issue_number": $number,
                "repo_name": $repo,
                "repo_structure": $structure
              },
              "response_mode": "blocking",
              "user": "github-actions-bot"
            }')

          curl -X POST 'https://api.dify.ai/v1/workflows/run' \
            -H "Authorization: Bearer $DIFY_API_KEY" \
            -H 'Content-Type: application/json' \
            -d "$JSON_PAYLOAD"
